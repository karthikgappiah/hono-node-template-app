# fly.toml app configuration file generated for hono-node-template-app on 2026-06-09T03:23:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hono-node-template-app'
primary_region = 'sjc'

[build]

[http_service]
# Must match PORT in .env and EXPOSE in Dockerfile.
internal_port = 3000
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
memory = '1gb'
cpu_kind = 'shared'
cpus = 1
memory_mb = 256
